<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procesos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --border: #d5dce6;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 40px auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .item h2 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.3;
    }

    .item p {
      margin: 0;
      font-size: 14px;
    }

    a {
      flex: 0 0 auto;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Procesos</h1>
    <p>Indice de procesos publicados con sus visores interactivos.</p>

    <section class="list" aria-label="Procesos disponibles">
      <article class="item">
        <div>
          <h2>Gestion de Demanda Tecnologica</h2>
          <p>Vista completa con zoom, pan, ajuste a pantalla y reset.</p>
        </div>
        <a href="processes/gestion-demanda-tecnologica/process-viewer.html">Abrir visor</a>
      </article>
    </section>
  </main>
</body>
</html>
