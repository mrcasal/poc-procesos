direction: LR
lane-order:
  - promoter
  - product_owner
  - committee
  - pmo
  - technical_team
spacing: normal
views:
  phases:
    - id: fase-0-recepcion-evaluacion
      label: "Fase 0: Recepcion y evaluacion inicial"
      nodes:
        - formalize_brief
        - send_initiative
        - review_brief
        - brief_complete
        - request_updates
        - update_brief
        - estimate_effort
        - create_epic
        - evaluate_initiative
        - approved
        - reject_epic
        - prioritize_epic
    - id: fase-1-definicion-funcional
      label: "Fase 1: Definicion funcional y descomposicion"
      nodes:
        - review_capacity
        - capacity_ok
        - freeze_intake
        - close_active_work
        - define_features
        - estimate_features
        - assign_features
        - verify_dependencies
    - id: fase-2-construccion-validacion
      label: "Fase 2: Construccion y validacion funcional"
      nodes:
        - dependencies_ok
        - block_epic
        - agree_contract
        - commit_delivery
        - reactivate_epic
        - refine_stories
        - build_stories
        - validate_features
        - features_closed
        - fix_stories
    - id: fase-3-validacion-despliegue
      label: "Fase 3: Validacion integrada y despliegue"
      nodes:
        - validate_scope
        - validation_ok
        - fix_scope
        - deploy_production
        - close_features
        - close_epic
